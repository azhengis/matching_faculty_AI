<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log In — DePaul Faculty Matcher</title>
<style>
:root {
  --navy:#003366; --scarlet:#C41E2E;
  --ground:#EEF2F7; --surface:#FFFFFF;
  --border:#CED6E2; --border-2:#B0BECE;
  --ink:#16202E; --ink-2:#4C5B72; --ink-3:#8594A8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ground);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:15px;line-height:1.65;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border:1.5px solid var(--border);padding:36px 40px;max-width:400px;width:calc(100% - 40px)}
h2{font-family:Georgia,"Times New Roman",serif;font-size:21px;font-weight:normal;margin-bottom:6px}
.sub{font-size:13.5px;color:var(--ink-2);margin-bottom:20px}
.tabs{display:flex;gap:20px;margin-bottom:20px;border-bottom:1.5px solid var(--border)}
.tab{padding:8px 2px;background:none;border:none;border-bottom:2px solid transparent;font-size:13.5px;font-weight:600;color:var(--ink-3);cursor:pointer;font-family:inherit}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;padding:10px 12px;font-size:14.5px;border:1.5px solid var(--border);background:var(--surface);color:var(--ink);outline:none;font-family:inherit}
.field input:focus{border-color:var(--navy)}
.btn{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn:hover{background:#004488}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status{min-height:18px;font-size:13px;color:#9B2020;margin-top:10px}
</style>
</head>
<body>

<div class="card">
  <h2 id="form-title">Log in</h2>
  <p class="sub" id="form-sub">Welcome back to the DePaul Faculty Matcher.</p>

  <div class="tabs">
    <button type="button" class="tab active" id="tab-login" onclick="setMode('login')">Log in</button>
    <button type="button" class="tab" id="tab-signup" onclick="setMode('signup')">Sign up</button>
  </div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email-input" placeholder="you@depaul.edu">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password-input" placeholder="••••••••">
  </div>

  <button class="btn" id="btn-submit" onclick="submitForm()">Log in</button>
  <div class="status" id="status"></div>
</div>

<script>
let _mode = 'login';

function setMode(mode) {
  _mode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('form-title').textContent = mode === 'login' ? 'Log in' : 'Sign up';
  document.getElementById('form-sub').textContent = mode === 'login'
    ? 'Welcome back to the DePaul Faculty Matcher.'
    : 'Create an account to build your profile and talk to the advisor.';
  document.getElementById('btn-submit').textContent = mode === 'login' ? 'Log in' : 'Sign up';
  document.getElementById('status').textContent = '';
}

async function submitForm() {
  const email    = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const status   = document.getElementById('status');
  const btn      = document.getElementById('btn-submit');

  if (!email || !password) {
    status.textContent = 'Please enter both email and password.';
    return;
  }

  btn.disabled = true;
  status.textContent = '';

  try {
    const res  = await fetch('/api/auth/' + _mode, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.error) {
      status.textContent = data.error;
      btn.disabled = false;
      return;
    }

    window.location.href = '/profile';
  } catch (e) {
    status.textContent = 'Network error: ' + e.message;
    btn.disabled = false;
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitForm();
});
</script>
</body>
</html>
