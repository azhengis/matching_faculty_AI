<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log In — DePaul Faculty Matcher</title>
<style>
:root {
  --navy:#003366; --navy-lift:#0B4E92; --scarlet:#C41E2E;
  --canvas:#F4F6FA; --surface:#FFFFFF; --paper:#FCFAF5;
  --border:#E2E8F1; --border-2:#CBD5E4;
  --ink:#111C2E; --ink-2:#55657E; --ink-3:#68778F;
  /* Kept in step with _shell.html — the login page stands alone and does not
     splice in the shared stylesheet. */
  --serif:"Palatino Linotype", Palatino, "Book Antiqua", Georgia, "Times New Roman", serif;
  --r-sm:8px; --r-md:12px; --r-lg:16px;
  --sh-sm:0 1px 2px rgba(17,28,46,.05);
  --sh-lg:0 16px 40px rgba(17,28,46,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--canvas);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:15px;line-height:1.65;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
:focus-visible{outline:2px solid var(--navy-lift);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.shell{max-width:412px;width:100%}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:18px;padding-left:2px}
.brand-mark{background:var(--scarlet);color:#fff;font-size:12px;font-weight:800;padding:4px 9px;border-radius:7px;letter-spacing:-.01em}
.brand-name{font-size:14px;font-weight:700;color:var(--navy);letter-spacing:-.01em}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);padding:34px 36px}
h2{font-family:var(--serif);font-size:26px;font-weight:normal;margin-bottom:6px;letter-spacing:-.01em}
.sub{font-size:14px;color:var(--ink-2);margin-bottom:22px}
.tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--canvas);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px 10px;background:none;border:none;border-radius:7px;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;font-family:inherit;transition:background .15s,color .15s}
.tab.active{color:var(--navy);background:var(--surface);box-shadow:var(--sh-sm)}
.field{margin-bottom:15px}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.field input{width:100%;padding:11px 13px;font-size:14.5px;border:1px solid var(--border-2);border-radius:var(--r-sm);background:var(--surface);color:var(--ink);outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:var(--navy-lift);box-shadow:0 0 0 3px rgba(11,78,146,.12)}
.btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:14.5px;font-weight:600;cursor:pointer;margin-top:6px;box-shadow:var(--sh-sm);transition:background .15s,transform .1s}
.btn:hover{background:var(--navy-lift)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.status{min-height:18px;font-size:13px;color:#9B2020;margin-top:11px}
.footnote{text-align:center;font-size:12.5px;color:var(--ink-3);margin-top:16px}
</style>
</head>
<body>

<div class="shell">
  <div class="brand">
    <span class="brand-mark">D</span>
    <span class="brand-name">DePaul Faculty Matcher</span>
  </div>

  <div class="card">
    <h2 id="form-title">Log in</h2>
    <p class="sub" id="form-sub">Welcome back to the DePaul Faculty Matcher.</p>

    <div class="tabs">
      <button type="button" class="tab active" id="tab-login" onclick="setMode('login')">Log in</button>
      <button type="button" class="tab" id="tab-signup" onclick="setMode('signup')">Sign up</button>
    </div>

    <div class="field">
      <label for="email-input">Email</label>
      <input type="email" id="email-input" placeholder="you@depaul.edu" autocomplete="email">
    </div>
    <div class="field">
      <label for="password-input">Password</label>
      <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn" id="btn-submit" onclick="submitForm()">Log in</button>
    <div class="status" id="status"></div>
  </div>

  <p class="footnote">Find collaborators across DePaul, and build your research proposal as you talk.</p>
</div>

<script>
let _mode = 'login';

function setMode(mode) {
  _mode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('form-title').textContent = mode === 'login' ? 'Log in' : 'Sign up';
  document.getElementById('form-sub').textContent = mode === 'login'
    ? 'Welcome back to the DePaul Faculty Matcher.'
    : 'Create an account to build your profile and talk to the advisor.';
  document.getElementById('btn-submit').textContent = mode === 'login' ? 'Log in' : 'Sign up';
  document.getElementById('status').textContent = '';
}

async function submitForm() {
  const email    = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const status   = document.getElementById('status');
  const btn      = document.getElementById('btn-submit');

  if (!email || !password) {
    status.textContent = 'Please enter both email and password.';
    return;
  }

  btn.disabled = true;
  status.textContent = '';

  try {
    const res  = await fetch('/api/auth/' + _mode, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.error) {
      status.textContent = data.error;
      btn.disabled = false;
      return;
    }

    window.location.href = '/profile';
  } catch (e) {
    status.textContent = 'Network error: ' + e.message;
    btn.disabled = false;
  }
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitForm();
});
</script>
</body>
</html>
