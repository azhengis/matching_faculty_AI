<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Advisor вЂ” DePaul Faculty Matcher</title>
<style>
{{SHELL_CSS}}

/* в”Ђв”Ђ Project bar в”Ђв”Ђ */
.project-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 26px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0}
.project-bar-eyebrow{font-size:10px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:var(--ink-3)}
.project-bar-title{font-size:14px;font-weight:700;color:var(--navy);flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.project-bar a{font-size:12.5px;text-decoration:none;border:1px solid var(--border);border-radius:999px;padding:5px 13px;color:var(--navy-lift);white-space:nowrap}
.project-bar a:hover{background:var(--canvas)}

/* в”Ђв”Ђ Two-column: proposal document (left) + chat (right) в”Ђв”Ђ
   The proposal is the artifact; the chat is how it gets made. */
.advisor-layout{flex:1;display:flex;min-height:0}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:760px;width:100%;margin:0 auto;padding:0 24px;min-height:0}
.advisor-shell{display:flex;flex-direction:column;height:100vh}

.proposal-sidepanel{width:min(44vw,600px);flex-shrink:0;border-right:1px solid var(--border);background:var(--paper);overflow-y:auto;padding:28px 32px 40px}
.proposal-doc-head{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--paper-line)}
.proposal-sidepanel h3{font-family:Georgia,serif;font-size:22px;font-weight:normal;margin-bottom:5px;letter-spacing:-.01em}
.proposal-sidepanel-sub{font-size:12.5px;color:var(--ink-3)}

.proposal-section{margin-bottom:26px;position:relative}
.proposal-section:last-of-type{margin-bottom:0}
.proposal-section-head{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.proposal-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--navy)}
.proposal-section-body{font-family:Georgia,serif;font-size:15.5px;color:#2A3648;line-height:1.75}
.proposal-section-body.typing::after{content:'';display:inline-block;width:2px;height:1em;background:var(--scarlet);margin-left:2px;vertical-align:text-bottom;animation:caret-blink .8s steps(1) infinite}
@keyframes caret-blink{50%{opacity:0}}
.proposal-section-body p{margin-bottom:9px}
.proposal-section-body p:last-child{margin-bottom:0}
.proposal-section-body ul{padding-left:20px;margin:0}
.proposal-section-body li{margin-bottom:5px}
.proposal-empty{font-family:Georgia,serif;font-size:14.5px;color:var(--ink-3);font-style:italic;line-height:1.7}

.btn-edit-section{background:none;border:none;padding:2px 7px;border-radius:6px;font-family:inherit;font-size:11.5px;color:var(--ink-3);cursor:pointer;opacity:0;transition:opacity .15s,background .15s,color .15s}
.proposal-section:hover .btn-edit-section,.btn-edit-section:focus-visible{opacity:1}
.btn-edit-section:hover{background:#EFE9DC;color:var(--navy)}
.edited-chip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--teal);background:var(--teal-bg);border-radius:999px;padding:2px 8px;white-space:nowrap}
.btn-release{background:none;border:none;padding:0;font-family:inherit;font-size:11.5px;color:var(--navy-lift);text-decoration:underline;cursor:pointer}
.btn-release:hover{color:var(--navy)}

.section-editor{width:100%;font-family:Georgia,serif;font-size:15.5px;line-height:1.75;color:#2A3648;background:var(--surface);border:1.5px solid var(--navy-lift);border-radius:var(--r-sm);padding:11px 13px;outline:none;resize:vertical;min-height:130px;box-shadow:var(--sh-sm)}
.editor-actions{display:flex;gap:8px;align-items:center;margin-top:9px;flex-wrap:wrap}
.btn-save-section{padding:7px 15px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-save-section:hover{background:var(--navy-lift)}
.btn-cancel-section{padding:7px 13px;background:none;border:1px solid var(--border-2);border-radius:var(--r-sm);font-size:13px;color:var(--ink-2);font-family:inherit;cursor:pointer}
.btn-cancel-section:hover{background:var(--canvas)}
.editor-hint{font-size:11.5px;color:var(--ink-3);margin-left:auto}

.btn-download{display:block;margin-top:30px;padding:12px 16px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center;box-shadow:var(--sh-sm);transition:background .15s}
.btn-download:hover{background:var(--navy-lift)}
.btn-download.disabled{opacity:.35;pointer-events:none}

/* в”Ђв”Ђ Messages в”Ђв”Ђ */
.messages{flex:1;overflow-y:auto;padding:24px 0 16px;display:flex;flex-direction:column;gap:18px;min-height:0}
.msg{display:flex;gap:10px;align-items:flex-start;max-width:100%}
.msg.user{flex-direction:row-reverse}
.bubble{padding:13px 17px;max-width:74%;line-height:1.65;font-size:14.5px;border-radius:var(--r-md)}
.msg.user .bubble{background:var(--navy);color:#fff;border-bottom-right-radius:4px}
.msg.bot  .bubble{background:var(--surface);color:var(--ink);border:1px solid var(--border);box-shadow:var(--sh-sm);border-bottom-left-radius:4px}
.avatar{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-top:2px}
.msg.user .avatar{background:var(--scarlet);color:#fff}
.msg.bot  .avatar{background:var(--navy);color:#fff}
.bubble p{margin-bottom:8px}
.bubble p:last-child{margin-bottom:0}
.bubble strong{font-weight:600}
.bubble em{font-style:italic}
.bubble ul,.bubble ol{padding-left:18px;margin-bottom:8px}
.bubble li{margin-bottom:3px}
.bubble h3{font-size:14.5px;font-weight:700;margin:10px 0 4px}

.result-cards{display:flex;flex-direction:column;gap:9px;margin-top:12px;max-width:100%}

.typing{display:none}
.dot{display:inline-block;width:6px;height:6px;background:var(--border-2);border-radius:50%;margin:0 2px;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

.input-bar{padding:14px 0 20px;flex-shrink:0;display:flex;gap:9px}
.chat-input{flex:1;padding:12px 15px;font-size:15px;border:1px solid var(--border-2);border-radius:var(--r-md);background:var(--surface);color:var(--ink);outline:none;font-family:inherit;resize:none;max-height:120px;overflow-y:auto;box-shadow:var(--sh-sm);transition:border-color .15s,box-shadow .15s}
.chat-input:focus{border-color:var(--navy-lift);box-shadow:0 0 0 3px rgba(11,78,146,.12)}
.btn-send{padding:12px 22px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-md);font-size:14px;font-weight:600;cursor:pointer;align-self:flex-end;white-space:nowrap;flex-shrink:0;box-shadow:var(--sh-sm);transition:background .15s}
.btn-send:hover{background:var(--navy-lift)}
.btn-send:disabled{opacity:.45;cursor:not-allowed}

.options{display:flex;flex-direction:column;gap:7px;margin-top:11px}
.opt-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 15px;text-align:left;font-size:13.5px;color:var(--ink);cursor:pointer;font-family:inherit;display:flex;gap:11px;align-items:baseline;box-shadow:var(--sh-sm);transition:border-color .15s,background .15s}
.opt-btn:hover{background:var(--canvas);border-color:var(--navy-lift)}
.opt-num{font-family:ui-monospace,monospace;font-size:11px;font-weight:700;color:var(--scarlet);flex-shrink:0;min-width:18px}

@media(max-width:1080px){
  .advisor-shell{height:auto;min-height:100vh}
  .advisor-layout{flex-direction:column-reverse}
  .proposal-sidepanel{width:100%;border-right:none;border-top:1px solid var(--border);max-height:44vh;padding:22px 20px 28px}
  .chat-wrap{min-height:60vh}
}
@media(max-width:560px){.bubble{max-width:92%}}
</style>
</head>
<body>
<div class="app">
{{SIDEBAR}}
<div class="content page-wide">
  <div class="advisor-shell">

    <div class="project-bar" id="project-bar" style="display:none">
      <span class="project-bar-eyebrow">Project</span>
      <span class="project-bar-title" id="pb-title"></span>
      <a id="pb-open" href="#">Open project</a>
      <a href="/projects">All projects</a>
    </div>

    <div id="loading" style="padding:40px"><span class="spinner"></span>LoadingвЂ¦</div>

    <div class="advisor-layout" id="advisor-layout" style="display:none">
      <div class="proposal-sidepanel" id="proposal-sidepanel">
        <div class="proposal-doc-head">
          <h3>Research Proposal</h3>
          <div class="proposal-sidepanel-sub">Sections appear as you settle them. Edit any section to make it your own.</div>
        </div>
        <div id="proposal-sections"></div>
        <a class="btn-download disabled" id="btn-download-proposal" href="#" onclick="return onDownloadProposal(event)">Download as Word doc</a>
      </div>

      <div class="chat-wrap" id="chat-wrap">
        <div class="messages" id="messages">
          <div class="msg bot typing" id="typing">
            <div class="avatar">AI</div>
            <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
          </div>
        </div>
        <div class="input-bar">
          <textarea class="chat-input" id="chat-input" rows="1"
                    placeholder="Answer the advisor, or ask anything about your researchвЂ¦"></textarea>
          <button class="btn-send" id="btn-send" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

  </div>
</div>
</div>

<script>
// в”Ђв”Ђ State в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let _busy      = false;
let _projectId = null;
let _proposal  = null;

const PROPOSAL_LABELS = {
  background:'Background', objectives:'Objectives', research_questions:'Research Questions',
  related_work:'Related Work', methodology:'Methodology', expected_outcomes:'Expected Outcomes',
};

// в”Ђв”Ђ Init в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
(async function init() {
  let me;
  try {
    const res = await fetch('/api/auth/me');
    if (!res.ok) throw new Error('not logged in');
    me = await res.json();
  } catch (e) { window.location.href = '/login'; return; }
  document.getElementById('sidebar-email').textContent = me.email || '';

  try {
    const res = await fetch('/api/profile/me');
    if (!res.ok) { window.location.href = '/profile'; return; }
  } catch (e) { window.location.href = '/profile'; return; }

  // The advisor always works on one project. Without one, go pick or make one.
  _projectId = new URLSearchParams(location.search).get('project');
  if (!_projectId) {
    try {
      const res  = await fetch('/api/projects');
      const data = await res.json();
      const list = data.projects || [];
      if (!list.length) { window.location.href = '/projects'; return; }
      _projectId = list[0].id;                       // most recently touched
      history.replaceState({}, '', '/advisor?project=' + _projectId);
    } catch (e) { window.location.href = '/projects'; return; }
  }

  let project;
  try {
    const res = await fetch('/api/projects/' + _projectId);
    project   = await res.json();
    if (!res.ok) throw new Error(project.error || 'no project');
  } catch (e) { window.location.href = '/projects'; return; }

  document.getElementById('pb-title').textContent = project.title;
  document.getElementById('pb-open').href = '/projects?open=' + _projectId;
  document.getElementById('project-bar').style.display = 'flex';
  document.getElementById('btn-download-proposal').href =
    `/api/projects/${_projectId}/proposal/download`;

  document.getElementById('loading').style.display        = 'none';
  document.getElementById('advisor-layout').style.display = 'flex';

  _proposal = project.proposal || null;
  renderProposalPanel();

  await callAdvisorAPI(project.session_id
    ? 'IвЂ™m back вЂ” where were we?'
    : 'Hello вЂ” I just filled in the intake for this project.');
})();

// в”Ђв”Ђ Send a message в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function sendMessage(text) {
  const input = document.getElementById('chat-input');
  const msg   = (text !== undefined ? text : input.value).trim();
  if (!msg || _busy) return;
  input.value = '';
  input.style.height = 'auto';
  addUserBubble(msg);
  await callAdvisorAPI(msg);
}

async function callAdvisorAPI(message) {
  _busy = true;
  document.getElementById('btn-send').disabled = true;
  showTyping(true);
  try {
    const res  = await fetch('/api/advisor/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message, project_id: _projectId })
    });
    const data = await res.json();
    if (data.error) {
      addBotRaw('<div class="bubble" style="color:#9B2020">' + esc(data.error) + '</div>');
    } else {
      renderBotReply(data.reply || '');
      checkProposal();
    }
  } catch (e) {
    addBotRaw('<div class="bubble" style="color:#9B2020">Network error: ' + esc(e.message) + '</div>');
  } finally {
    _busy = false;
    document.getElementById('btn-send').disabled = false;
    showTyping(false);
  }
}

// в”Ђв”Ђ Rendering the reply в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderBotReply(raw) {
  const { main, options } = parseReply(raw);
  let optsHtml = '';
  if (options.length) {
    optsHtml = '<div class="options">' + options.map(o =>
      `<button class="opt-btn" onclick="sendMessage(${esc(JSON.stringify(o.text))})">` +
      `<span class="opt-num">[${o.num}]</span>${esc(o.text)}</button>`
    ).join('') + '</div>';
  }
  addBotRaw(`<div class="bubble">${markdownToHtml(main)}</div>${optsHtml}`);
}

function parseReply(text) {
  const options = [], mainLines = [];
  let inOpts = false;
  for (const line of String(text || '').split('\n')) {
    const m = line.match(/^\s*\[(\d+)\]\s*(.+)$/);
    if (m) { inOpts = true; options.push({ num: m[1], text: m[2].trim() }); continue; }
    if (!inOpts) mainLines.push(line);
  }
  const main = mainLines.join('\n').replace(/What would you like to do next\?\s*$/i, '').trimEnd();
  return { main, options };
}

function markdownToHtml(text) {
  let h = esc(text);
  h = h.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>').replace(/^##\s+(.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/^[-вЂў]\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  h = h.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
  h = h.replace(/\n{2,}/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + h + '</p>';
}

// в”Ђв”Ђ DOM helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function addUserBubble(text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar">You</div><div class="bubble">${esc(text)}</div>`;
  messages.insertBefore(div, document.getElementById('typing'));
  scrollBottom();
}

function addBotRaw(html) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="avatar">AI</div><div>${html}</div>`;
  messages.insertBefore(div, document.getElementById('typing'));
  scrollBottom();
}

function showTyping(show) {
  document.getElementById('typing').style.display = show ? 'flex' : 'none';
  if (show) scrollBottom();
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function logout() {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login';
}

// в”Ђв”Ђ Research proposal panel в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let _proposalPrev    = {};
let _proposalTimers  = {};
let _editingSections = new Set();   // open editors вЂ” never re-render these out from under the writer
let _noAnimate       = new Set();   // your own edits appear instantly, not typed back at you

async function checkProposal() {
  try {
    const res  = await fetch(`/api/projects/${_projectId}/proposal`);
    _proposal  = await res.json();
    renderProposalPanel();
  } catch (e) { /* network hiccup вЂ” the panel just won't update this turn */ }
}

function isLocked(k) {
  return !!(_proposal && Array.isArray(_proposal.edited_sections) && _proposal.edited_sections.includes(k));
}

function renderProposalPanel() {
  const container  = document.getElementById('proposal-sections');
  const keys       = Object.keys(PROPOSAL_LABELS);
  const hasContent = keys.some(k => (_proposal && _proposal[k] || '').trim());

  document.getElementById('btn-download-proposal').classList.toggle('disabled', !hasContent);

  if (!hasContent && !_editingSections.size) {
    container.innerHTML = '<div class="proposal-empty">Nothing yet. As you and the advisor settle each part вЂ” the background, your objectives, the methodology вЂ” it appears here.</div>';
    _proposalPrev = {};
    return;
  }
  const placeholder = container.querySelector('.proposal-empty');
  if (placeholder) placeholder.remove();

  for (const k of keys) {
    if (_editingSections.has(k)) continue;   // you're writing in it вЂ” hands off

    const val = (_proposal && _proposal[k]) ? _proposal[k].trim() : '';
    let sectionEl = document.getElementById('proposal-section-' + k);

    if (!val) {
      if (sectionEl) sectionEl.remove();
      delete _proposalPrev[k];
      continue;
    }

    const locked = isLocked(k);
    if (!sectionEl) {
      sectionEl = document.createElement('div');
      sectionEl.className = 'proposal-section';
      sectionEl.id = 'proposal-section-' + k;
      sectionEl.innerHTML = `<div class="proposal-section-head">${sectionHeadInner(k, locked)}</div><div class="proposal-section-body"></div>`;
      insertSectionInOrder(container, sectionEl, k, keys);
      paintBody(sectionEl.querySelector('.proposal-section-body'), val, k, locked);
      _proposalPrev[k] = val;
      continue;
    }

    sectionEl.querySelector('.proposal-section-head').innerHTML = sectionHeadInner(k, locked);
    if (val !== _proposalPrev[k]) {
      paintBody(sectionEl.querySelector('.proposal-section-body'), val, k, locked);
      _proposalPrev[k] = val;
    }
  }
}

function sectionHeadInner(k, locked) {
  const label = `<span class="proposal-section-label">${esc(PROPOSAL_LABELS[k])}</span>`;
  if (locked) {
    return label + `<span class="edited-chip">Edited by you</span>` +
      `<button class="btn-release" onclick="releaseSection('${k}')">let the advisor update this</button>`;
  }
  return label + `<button class="btn-edit-section" onclick="editSection('${k}')">Edit</button>`;
}

// Keep sections in order even though they arrive out of order.
function insertSectionInOrder(container, sectionEl, key, keys) {
  const idx = keys.indexOf(key);
  for (let i = idx + 1; i < keys.length; i++) {
    const next = document.getElementById('proposal-section-' + keys[i]);
    if (next) { container.insertBefore(sectionEl, next); return; }
  }
  container.appendChild(sectionEl);
}

// Advisor-written text types itself in; your own text appears immediately.
function paintBody(body, val, k, locked) {
  if (locked || _noAnimate.has(k)) {
    if (_proposalTimers[k]) { clearTimeout(_proposalTimers[k]); delete _proposalTimers[k]; }
    body.classList.remove('typing');
    body.innerHTML = proposalTextToHtml(val);
    _noAnimate.delete(k);
    return;
  }
  typewriterReveal(body, val, k);
}

function typewriterReveal(el, fullText, key) {
  if (_proposalTimers[key]) clearTimeout(_proposalTimers[key]);
  el.classList.add('typing');

  const totalMs      = Math.min(1800, Math.max(400, fullText.length * 9));
  const steps        = Math.min(fullText.length, 60);
  const charsPerStep = Math.max(1, Math.ceil(fullText.length / steps));
  const intervalMs   = totalMs / steps;

  let i = 0;
  const tick = () => {
    i += charsPerStep;
    if (i >= fullText.length) {
      el.innerHTML = proposalTextToHtml(fullText);
      el.classList.remove('typing');
      delete _proposalTimers[key];
      return;
    }
    el.textContent = fullText.slice(0, i);
    _proposalTimers[key] = setTimeout(tick, intervalMs);
  };
  tick();
}

function proposalTextToHtml(text) {
  const lines = String(text || '').split('\n').map(l => l.trim()).filter(Boolean);
  const isBullet = l => l.startsWith('- ') || l.startsWith('вЂў ');
  let html = '', buf = [];
  const flush = () => {
    if (buf.length) {
      html += '<ul>' + buf.map(l => `<li>${esc(l.replace(/^[-вЂў]\s+/, ''))}</li>`).join('') + '</ul>';
      buf = [];
    }
  };
  for (const line of lines) {
    if (isBullet(line)) buf.push(line);
    else { flush(); html += `<p>${esc(line)}</p>`; }
  }
  flush();
  return html;
}

// в”Ђв”Ђ Editing a section by hand в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function editSection(k) {
  const sectionEl = document.getElementById('proposal-section-' + k);
  if (!sectionEl) return;
  if (_proposalTimers[k]) { clearTimeout(_proposalTimers[k]); delete _proposalTimers[k]; }

  _editingSections.add(k);
  const current = (_proposal && _proposal[k]) ? _proposal[k].trim() : '';
  const body    = sectionEl.querySelector('.proposal-section-body');
  body.classList.remove('typing');
  body.innerHTML =
    `<textarea class="section-editor" id="editor-${k}"></textarea>
     <div class="editor-actions">
       <button class="btn-save-section" onclick="saveSection('${k}')">Save</button>
       <button class="btn-cancel-section" onclick="cancelSection('${k}')">Cancel</button>
       <span class="editor-hint">Once you save, the advisor stops rewriting this.</span>
     </div>`;

  const ta = document.getElementById('editor-' + k);
  ta.value = current;                        // set as value, never as HTML
  ta.style.height = 'auto';
  ta.style.height = Math.max(130, ta.scrollHeight + 2) + 'px';
  ta.focus();
}

function cancelSection(k) {
  _editingSections.delete(k);
  _noAnimate.add(k);
  _proposalPrev[k] = null;
  renderProposalPanel();
}

async function saveSection(k) {
  const ta = document.getElementById('editor-' + k);
  if (!ta) return;
  const text = ta.value.trim();
  try {
    const res  = await fetch(`/api/projects/${_projectId}/proposal`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ section: k, text })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not save');
    if (!_proposal) _proposal = {};
    _proposal[k] = text;
    _proposal.edited_sections = data.edited_sections || [];
  } catch (e) {
    alert('Could not save this section: ' + e.message);
    return;
  }
  _editingSections.delete(k);
  _noAnimate.add(k);
  _proposalPrev[k] = null;
  renderProposalPanel();
}

async function releaseSection(k) {
  try {
    const res  = await fetch(`/api/projects/${_projectId}/proposal`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ section: k, release: true })
    });
    const data = await res.json();
    if (!res.ok) return;
    if (!_proposal) _proposal = {};
    _proposal.edited_sections = data.edited_sections || [];
  } catch (e) { return; }
  _noAnimate.add(k);
  renderProposalPanel();
}

function onDownloadProposal(event) {
  const hasContent = Object.keys(PROPOSAL_LABELS).some(k => (_proposal && _proposal[k] || '').trim());
  if (!hasContent) { event.preventDefault(); return false; }
  return true;
}

// в”Ђв”Ђ Input events в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
